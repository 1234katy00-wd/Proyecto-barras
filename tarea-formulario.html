<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
    
<body>
    <form> 
        <h1>¡Regístrate y únete a la comunidad!</h1>
        <br><br>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre">
        <br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido">
        <br><br>

        <label for="correo-electrónico">Correo Electrónico:</label>
        <input type="email" id="correo-electrónico">
        <br><br>

        <label for="contraseña">Contraseña:</label>
        <input type="password" id="contraseña">
        <br><br>

        <label for="confirmación-de-pasword">Confirmación de contraseña:</label>
        <input type="password" id="confirmación-de-pasword">
        <br><br>

        <label for="fecha-de-nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fecha-de-nacimiento">
        <br><br>

        <label>Género:</label>
        <input type="radio" id="masculino" name="genero">
        <label for="masculino">Masculino</label>
        <input type="radio" id="femenino" name="genero">
        <label for="femenino">Femenino</label>
        <input type="radio" id="prefiero-no-decir" name="genero">
        <label for="prefiero-no-decir">Prefiero no decir</label>
        <br><br>

        <input type="checkbox" id="suscribirse">
        <label for="suscribirse">Suscríbete a nuestro boletín de noticias</label>
        <br><br>

        <label for="descripcion-de-mi-mismo">Una descripción de mi mismo:</label>
        <br>
        <textarea name="descripcion-de-mi-mismo" id="descripcion-de-mi-mismo" maxlength="5"></textarea>
        <br><br>
        
        <label for="selecciona-tus-intereses">Selecciona tus intereses:</label>
        <br>
        <select name="intereses" id="selecciona-tus-intereses" multiple size="4"> 
            <option value="musica">Música</option>
            <option value="deportes">Deportes</option>
            <option value="viajes">Viajes</option>
            <option value="tecnología">Tecnología</option>  
        </select>
        <br><br>
        
        <input type="submit" value="¡Registrarse!">
        
    </form>

</body>
</html>
